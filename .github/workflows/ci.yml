# ==========================================================================
# LogSentinel — CI Pipeline
# ==========================================================================
# Runs on push to main and pull requests.
# Jobs: lint, test (with PostgreSQL service), docker-build.
# ==========================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ------------------------------------------------------------------
  # Lint — ruff check + format validation
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check app/ tests/ scripts/

      - name: Ruff format check
        run: ruff format --check app/ tests/ scripts/

  # ------------------------------------------------------------------
  # Test — pytest with PostgreSQL service container
  # ------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: LogSentinel
          POSTGRES_PASSWORD: LogSentinel
          POSTGRES_DB: LogSentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U LogSentinel -d LogSentinel_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://LogSentinel:LogSentinel@localhost:5432/LogSentinel_test
      REMEDIATION_ENABLED: "false"
      PROMETHEUS_ENABLED: "false"
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ------------------------------------------------------------------
  # Docker Build — validate the image builds successfully
  # ------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          tags: logsentinel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
