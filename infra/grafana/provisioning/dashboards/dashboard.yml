# Grafana — Dashboard provisioning configuration
apiVersion: 1

providers:
  - name: "LogSentinel"
    orgId: 1
    folder: "LogSentinel"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
